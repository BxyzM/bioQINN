# Base configuration for quantum classifier training on protein-complex data
# Author: Dr. Aritra Bal (ETP)
# Date: December 04, 2025

seed: "QML_Protein_Complex_Seed_001"

# Directory paths
directories:
  native_path: '/ceph/abal/piston/work_dir_2/data_preparation/'
  docked_path: '/ceph/abal/piston/work_dir_2/data_preparation/docked/PROTEIN_NAME/'
  output_path: '/ceph/abal/piston/QML/model_training/outputs/'
  base_data: '/ceph/abal/piston/work_dir_2/data_preparation/'
  models: '/ceph/abal/piston/QML/model_training/outputs/'

# Data loading configuration
data:
  protein_pairs:
    - "1TM1_E_I"
    - "3FK9_A_B"
    - "2IHS_A_C"
    - "3CO2_A_D"
    - "2A5Z_A_C"
    - "1PXV_A_C"
    - "1L4I_A_B"
    - "3IBM_A_B"
    - "3FUY_A_B"
  
  # Dataloader settings
  batch_size: 1
  shuffle: true
  num_workers: 0
  exclude_pattern: "resname"
  
  # Data split configuration
  train_val_split: 0.8
  neg_pos_ratio: 4
  use_separate_paths: false
  train_path: null
  val_path: null
  
  # Label configuration
  label_file: null
  positive_class: 1
  negative_class: 0

# Quantum circuit architecture
circuit:
  qubits: 5
  layers: 3
  device_name: 'default.qubit'
  backend: 'autograd'
  shots: null
  approx: null
  use_aux_wire: false
  
  # Circuit operation settings
  encoding_type: 'amplitude'
  entanglement_type: 'full'
  operation_type: 'general_rot'

# Training configuration
training:
  epochs: 50
  batch_size: 1
  train_max_n: 10000
  valid_max_n: 2000
  
  # Early stopping and learning rate decay
  patience: 3
  improv: 0.01
  lr_decay: true
  
  # Checkpointing
  save_checkpoints: true
  checkpoint_frequency: 5
  save_best_only: false
  
  # Validation frequency
  validate_every_n_epochs: 1

# Optimizer configuration
optimizer:
  name: 'adam'
  learning_rate: 0.001
  
  # Adam-specific parameters
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8
  
  # Momentum optimizer parameters
  momentum: 0.9
  
  # RMSprop parameters
  decay: 0.9
  
  # Gradient clipping
  gradient_clip: null

# Loss function configuration
loss:
  type: 'MSE'
  
  # Loss-specific parameters
  label_smoothing: 0.0
  class_weights: null

# Weights & Biases configuration
wandb:
  enabled: true
  project: 'protein-complex-qml'
  entity: null
  name: 'qml_protein_v1'
  tags:
    - 'quantum-ml'
    - 'protein-complex'
    - 'piston-framework'
  notes: 'Quantum classifier for protein-complex stability prediction'
  
  # Logging frequency
  log_frequency: 1
  log_gradients: false
  log_weights: false

# Logging configuration
logging:
  level: 'INFO'
  save_logs: true
  console_output: true

# Hardware configuration
hardware:
  use_gpu: false
  device_id: 0
  parallel: false
  num_threads: 1

# Reproducibility settings
reproducibility:
  deterministic: true
  seed_value: 42
  benchmark: false
  cudnn_deterministic: true

# Advanced settings
advanced:
  # Fisher information computation
  compute_fisher: false
  fisher_samples: 100
  use_adjoint_fisher: false
